<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Syed Sameer | Full Stack Developer & Cybersecurity Engineer</title>
  <meta name="description" content="Portfolio of Syed Sameer, Full Stack Developer & Cyber Security Engineer. Showcasing projects, skills, and contact information." />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Reset and basics */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2e2e4f);
      color: #fff;
      margin: 0;
      padding: 2rem 1rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      scroll-behavior: smooth;
    }
    a {
      color: #ffc371;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }
    a:hover, a:focus {
      color: #fff;
      outline: none;
    }
    h1, h2, h3 {
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 700;
    }
    h2 {
      font-size: 2rem;
      border-left: 5px solid #ffc371;
      padding-left: 0.75rem;
      margin-bottom: 1rem;
      margin-top: 2rem;
    }
    h3 {
      color: #ffc371;
      font-weight: 600;
    }
    p {
      line-height: 1.6;
      color: #ddd;
    }

    /* Intro card */
    .intro-box {
      position: relative;
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: 0 10px 25px rgba(255, 99, 71, 0.5);
      background: #1f1f2e;
      animation: fadeInUp 1s ease forwards;
    }
    .intro-box::before {
      content: "";
      position: absolute;
      top: -20%;
      left: -20%;
      width: 140%;
      height: 140%;
      background: conic-gradient(from 0deg, #ff5f6d, #ffc371, #ff5f6d);
      filter: blur(20px);
      animation: spin 8s linear infinite;
      z-index: 0;
    }
    .intro-content {
      position: relative;
      padding: 2.5rem 2rem 3rem;
      z-index: 1;
      text-align: center;
    }
    .links {
      margin-top: 1rem;
    }
    .links a {
      margin: 0 0.6rem;
    }

    /* Navigation for quick scroll */
    nav {
      margin-bottom: 1rem;
    }
    nav a {
      margin: 0 1rem;
      font-weight: 600;
      font-size: 1rem;
    }

    /* Projects */
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
      gap: 1.5rem;
      max-width: 1000px;
      width: 100%;
    }
    .project-card {
      background: #2e2e4f;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }
    .project-card:hover, .project-card:focus-within {
      transform: scale(1.05);
      outline: none;
    }
    .project-image {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 1rem;
      object-fit: cover;
      aspect-ratio: 16/9;
      background: #444;
    }
    .project-card a {
      margin-top: auto;
      align-self: flex-start;
      color: #76c7f2;
      font-weight: 600;
    }

    /* Skills */
    .skills-list {
      max-width: 1000px;
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-top: 0.5rem;
      justify-content: center;
    }
    .skill {
      background: #ffc371;
      color: #000;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      animation: fadeInUp 0.5s ease forwards;
    }

    /* Contact */
    .contact {
      max-width: 420px;
      width: 100%;
      background: #1b1b2f;
      border-radius: 16px;
      padding: 2rem 2.5rem;
      margin-top: 2rem;
      box-shadow: 0 12px 25px rgba(255, 195, 113, 0.5);
      animation: fadeInUp 1.2s ease forwards;
      color: #fff;
      font-weight: 500;
      border: 2px solid #ffc371;
    }
    .contact h2 {
      margin-top: 0;
      color: #ffc371;
      font-weight: 700;
      text-align: center;
    }
    .contact p.instructions {
      font-size: 0.9rem;
      margin-bottom: 1rem;
      color: #ffd77a;
      text-align: center;
      font-style: italic;
    }
    .contact label {
      display: block;
      margin: 1rem 0 0.25rem;
      font-weight: 600;
      color: #ffc371;
    }
    .contact input, .contact textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      background: #2e2e4f;
      color: #fff;
      transition: background-color 0.3s ease;
    }
    .contact input:focus, .contact textarea:focus {
      background-color: #3f3f65;
      outline: none;
    }
    .contact textarea {
      min-height: 120px;
    }
    .contact button {
      margin-top: 1.5rem;
      background: #ffc371;
      border: none;
      color: #000;
      padding: 0.75rem 1.5rem;
      font-weight: 700;
      border-radius: 25px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      width: 100%;
      font-size: 1.1rem;
    }
    .contact button:hover, .contact button:focus {
      background: #ff9f43;
      outline: none;
    }
    #form-status {
      margin-top: 1rem;
      color: #ffd77a;
      font-weight: 600;
      text-align: center;
      min-height: 1.2em;
    }

    /* Footer */
    footer {
      margin-top: auto;
      padding: 1rem 0;
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      user-select: none;
    }

    /* Animations */
    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }
    @keyframes fadeInUp {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* Cybersecurity Animated Icon (SVG glow effect) */
    .cyber-icon {
      width: 100px;
      height: 100px;
      margin: 1.5rem auto;
      display: block;
      filter: drop-shadow(0 0 8px #ffc371);
      animation: pulseGlow 2.5s infinite ease-in-out;
    }
    @keyframes pulseGlow {
      0%, 100% {
        filter: drop-shadow(0 0 8px #ffc371);
        opacity: 1;
      }
      50% {
        filter: drop-shadow(0 0 20px #ffae42);
        opacity: 0.7;
      }
    }

    /* Responsive */
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      h2 {
        font-size: 1.5rem;
      }
      .projects {
        grid-template-columns: 1fr;
      }
      .contact {
        padding: 1.5rem 1.5rem;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </nav>
